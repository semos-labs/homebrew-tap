name: Update Xyron Formula

on:
  repository_dispatch:
    types: [update-formula-xyron]

permissions:
  contents: write

jobs:
  update-xyron:
    name: Update Xyron Formula
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Xyron formula
        run: |
          mkdir -p Formula
          cat > Formula/xyron.rb << 'EOF'
          class Xyron < Formula
            desc "Project-aware shell with built-in runtime manager"
            homepage "https://github.com/semos-labs/xyron"
            version "${{ github.event.client_payload.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/semos-labs/xyron/releases/download/v#{version}/xyron-darwin-arm64.tar.gz"
                sha256 "${{ github.event.client_payload.darwin_arm64_sha256 }}"
              end
              on_intel do
                url "https://github.com/semos-labs/xyron/releases/download/v#{version}/xyron-darwin-x64.tar.gz"
                sha256 "${{ github.event.client_payload.darwin_x64_sha256 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/semos-labs/xyron/releases/download/v#{version}/xyron-linux-x64.tar.gz"
                sha256 "${{ github.event.client_payload.linux_x64_sha256 }}"
              end
              on_arm do
                url "https://github.com/semos-labs/xyron/releases/download/v#{version}/xyron-linux-arm64.tar.gz"
                sha256 "${{ github.event.client_payload.linux_arm64_sha256 }}"
              end
            end

            def install
              bin.install "xyron"
            end

            test do
              assert_predicate bin/"xyron", :executable?
              assert_match "xyron", shell_output("#{bin}/xyron --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/xyron.rb
          git diff --staged --quiet || git commit -m "xyron ${{ github.event.client_payload.version }}"
          git push
